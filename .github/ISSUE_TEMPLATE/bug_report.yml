name: Bug Report
description: Report a bug or unexpected behaviour in the PACE framework
title: "[BUG] "
labels: ["bug", "triage"]
assignees: []

body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting a bug. Fill in the sections below so we can reproduce and fix it quickly.

  - type: input
    id: pace_version
    attributes:
      label: PACE Framework Version
      description: Run `python pace.py --version` or check `CHANGELOG.md`
      placeholder: "e.g. v2.1.0"
    validations:
      required: true

  - type: input
    id: python_version
    attributes:
      label: Python Version
      description: Output of `python --version`
      placeholder: "e.g. 3.11.4"
    validations:
      required: true

  - type: dropdown
    id: component
    attributes:
      label: Affected Component
      description: Which PACE agent or subsystem is misbehaving?
      multiple: false
      options:
        - SCRIBE (plan generation)
        - PRIME (plan execution)
        - CONDUIT (git/GitHub integration)
        - HERALD (notifications)
        - LEDGER (spend tracking)
        - Plugin system
        - CI pipeline
        - pace update / self-update
        - Other
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: Bug Description
      description: What happened? What did you expect to happen?
      placeholder: |
        Expected: ...
        Actual: ...
    validations:
      required: true

  - type: textarea
    id: reproduction
    attributes:
      label: Steps to Reproduce
      description: Minimal steps to trigger the bug
      placeholder: |
        1. Run `python pace.py run --plan plan.yaml`
        2. Observe error ...
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Relevant Logs / Traceback
      description: Paste any error output, stack traces, or log snippets
      render: shell

  - type: textarea
    id: context
    attributes:
      label: Additional Context
      description: Any other context, screenshots, or config snippets that might help
