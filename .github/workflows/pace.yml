name: PACE Daily Cycle

on:
  schedule:
    # Runs at 09:00 UTC on weekdays. Adjust to your team's timezone.
    - cron: "0 9 * * 1-5"
  workflow_dispatch:
    inputs:
      day:
        description: "PACE day number to run (overrides PACE_DAY from schedule)"
        required: false
        type: string

permissions:
  contents: write       # push .pace/ artifacts and PROGRESS.md
  issues: write         # open escalation issues
  pull-requests: write  # open review gate PRs
  actions: write        # set PACE_PAUSED and spend-tracking repository variables

jobs:
  pace:
    name: "PACE Day ${{ inputs.day || vars.PACE_DAY }}"
    runs-on: ubuntu-latest
    timeout-minutes: 90

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # full history for git log / baseline reads
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Configure git identity
        run: |
          git config user.name "PACE Orchestrator"
          git config user.email "pace@${{ github.repository_owner }}.github"

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: pace/requirements.txt

      - name: Install PACE dependencies
        run: pip install -r pace/requirements.txt

      # ---------------------------------------------------------------------------
      # Optional: set up your project's build environment here.
      # Examples:
      #
      # - name: Set up Go
      #   uses: actions/setup-go@v5
      #   with:
      #     go-version-file: go.mod
      #
      # - name: Set up Node.js
      #   uses: actions/setup-node@v4
      #   with:
      #     node-version: "20"
      #     cache: npm
      #
      # - name: Install project dependencies
      #   run: npm ci
      # ---------------------------------------------------------------------------

      - name: Check daily budget
        id: budget_check
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PACE_DAILY_BUDGET: ${{ vars.PACE_DAILY_BUDGET }}
          PACE_DAILY_SPEND: ${{ vars.PACE_DAILY_SPEND }}
          PACE_DAILY_SPEND_DATE: ${{ vars.PACE_DAILY_SPEND_DATE }}
          PACE_REPORTER_TIMEZONE: ${{ vars.PACE_REPORTER_TIMEZONE || 'UTC' }}
        run: |
          # Manual workflow_dispatch runs always proceed — budget cap only applies to scheduled runs.
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "PACE_SPEND_TODAY=${PACE_DAILY_SPEND:-0}" >> $GITHUB_ENV
            echo "budget_exceeded=false" >> $GITHUB_OUTPUT
            echo "[PACE] Manual trigger — budget check bypassed."
            exit 0
          fi

          # Use the configured timezone so the budget day aligns with the team's calendar day.
          TODAY=$(TZ="${PACE_REPORTER_TIMEZONE}" date +%Y-%m-%d)
          BUDGET="${PACE_DAILY_BUDGET:-0}"
          SPEND="${PACE_DAILY_SPEND:-0}"

          # Reset accumulated spend if it belongs to a previous day.
          if [ "${PACE_DAILY_SPEND_DATE:-}" != "$TODAY" ]; then
            SPEND="0"
            gh variable set PACE_DAILY_SPEND      --body "0"      --repo ${{ github.repository }} || true
            gh variable set PACE_DAILY_SPEND_DATE --body "$TODAY" --repo ${{ github.repository }} || true
          fi

          # PACE_SPEND_TODAY is read by the orchestrator to compute the running total.
          echo "PACE_SPEND_TODAY=${SPEND}" >> $GITHUB_ENV

          if [ "$BUDGET" = "0" ] || [ -z "$BUDGET" ]; then
            echo "budget_exceeded=false" >> $GITHUB_OUTPUT
            echo "[PACE] No daily budget configured — proceeding."
          elif python3 -c "import sys; sys.exit(0 if float('${SPEND}') >= float('${BUDGET}') else 1)"; then
            echo "budget_exceeded=true" >> $GITHUB_OUTPUT
            echo "[PACE] Daily budget \$${BUDGET} reached (\$${SPEND} spent today). Skipping run."
          else
            echo "budget_exceeded=false" >> $GITHUB_OUTPUT
            echo "[PACE] Budget OK — \$${SPEND} of \$${BUDGET} used today."
          fi

      - name: Run PACE cycle
        if: steps.budget_check.outputs.budget_exceeded != 'true'
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          PACE_DAY: ${{ inputs.day || vars.PACE_DAY }}
          PACE_PAUSED: ${{ vars.PACE_PAUSED || 'false' }}
          PACE_SPEND_TODAY: ${{ env.PACE_SPEND_TODAY }}
        run: python pace/orchestrator.py

      - name: Pause on escalated HOLD
        if: failure()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PACE_CURRENT_DAY: ${{ inputs.day || vars.PACE_DAY }}
        run: |
          # Only pause if the orchestrator actually exhausted retries (escalated sentinel file present).
          # CycleAbortError, preflight failures, and budget skips do not create this file.
          ESCALATED_FILE=".pace/day-${PACE_CURRENT_DAY}/escalated"
          if [ -f "$ESCALATED_FILE" ]; then
            gh variable set PACE_PAUSED --body "true" --repo ${{ github.repository }}
            echo "[PACE] PACE_PAUSED set to true (workflow fallback — escalated sentinel found)."
          else
            echo "[PACE] Run failed but no escalated sentinel — not pausing (abort or preflight failure)."
          fi

      - name: Write job summary
        if: always()
        run: echo "See PACE job step summary for details." >> $GITHUB_STEP_SUMMARY
