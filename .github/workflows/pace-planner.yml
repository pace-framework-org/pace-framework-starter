name: PACE Planner

# Runs at sprint start and whenever a re-plan is needed.
# On completion, sets PACE_PAUSED=true and opens a plan-approval PR.
# Merge the PR to resume the daily PACE cycle.

on:
  # Manually trigger from the Actions tab (recommended way to initiate a re-plan)
  workflow_dispatch:
    inputs:
      replan:
        description: "Force re-estimation of all days (even if no shipped days)"
        required: false
        default: "false"
        type: choice
        options:
          - "false"
          - "true"

  # Optional: run automatically at the start of each sprint.
  # Adjust the cron and uncomment to enable scheduled re-plans.
  # schedule:
  #   - cron: "0 8 * * 1"   # Every Monday at 08:00 UTC

permissions:
  contents: write       # push pace/plan-approval branch with planner artifacts
  pull-requests: write  # open plan-approval PR
  actions: write        # set PACE_PAUSED repository variable

jobs:
  planner:
    name: "PACE Planner"
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Configure git identity
        run: |
          git config user.name "PACE Planner"
          git config user.email "pace@${{ github.repository_owner }}.github"

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: pace/requirements.txt

      - name: Install PACE dependencies
        run: pip install -r pace/requirements.txt

      - name: Validate PACE configuration
        run: python pace/config_tester.py

      - name: Run PACE Planner
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          PACE_REPLAN: ${{ inputs.replan || 'false' }}
        run: |
          FLAGS=""
          if [ "${{ inputs.replan }}" = "true" ]; then
            FLAGS="--replan"
          fi
          python pace/planner.py --pipeline $FLAGS

      # ---------------------------------------------------------------------------
      # Commit planner artifacts to pace/plan-approval branch and open the PR.
      # The branch is force-updated on every planner run so the PR always shows
      # the latest estimates.
      # ---------------------------------------------------------------------------

      - name: Commit planner artifacts
        run: |
          # Switch to (or create) the plan-approval branch
          git checkout -B pace/plan-approval

          # Stage only the planner outputs — do not commit unrelated changes
          git add .pace/day-0/planner.md .pace/shipped.yaml 2>/dev/null || true

          # Bail out gracefully if there is nothing new to commit
          if git diff --cached --quiet; then
            echo "[PACE Planner] No changes to planner artifacts — skipping commit."
            exit 0
          fi

          git commit -m "$(printf 'chore(planner): update sprint plan estimates and shipped manifest\n\nGenerated by PACE Planner pipeline — %s\nMerge this PR to approve the plan and resume the PACE daily cycle.' "$(date -u +%Y-%m-%dT%H:%M:%SZ)")"

          git push --force-with-lease origin pace/plan-approval

      - name: Open plan-approval PR
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # PR body defined here to avoid heredoc indentation conflicts in the YAML
          # block scalar. GitHub Actions expands ${{ }} expressions before the shell
          # sees this value, so run_id is resolved at workflow parse time.
          PR_BODY: |
            ## PACE Plan Approval

            The PACE Planner has updated the sprint cost estimates.

            **Review the estimates in `.pace/day-0/planner.md` and merge this PR to resume the daily cycle.**

            > ℹ️ The daily cycle is currently paused (`PACE_PAUSED=true`).
            > Merging this PR will not automatically resume it — you must also set `PACE_PAUSED` to `false`
            > (via the Actions → Variables UI, or by triggering the daily workflow manually with the day number).

            ### What was updated

            - `.pace/day-0/planner.md` — per-day cost estimates (re-estimated for remaining days; actuals preserved for shipped days)
            - `.pace/shipped.yaml` — manifest of shipped days that are protected from re-planning

            ### To resume after merging

            1. Verify the estimates look reasonable
            2. Merge this PR
            3. Set the `PACE_PAUSED` Actions variable to `false`
            4. The PACE daily cycle will run on the next scheduled trigger (or trigger it manually)

            ---

            *Generated by PACE Planner — ${{ github.run_id }}*
        run: |
          # Fetch default branch name
          DEFAULT_BRANCH=$(gh repo view --json defaultBranchRef --jq .defaultBranchRef.name)

          # Check whether a plan-approval PR is already open (avoid duplicates)
          EXISTING=$(gh pr list \
            --head "pace/plan-approval" \
            --base "$DEFAULT_BRANCH" \
            --state open \
            --json number \
            --jq '.[0].number' 2>/dev/null || echo "")

          if [ -n "$EXISTING" ]; then
            echo "[PACE Planner] Plan-approval PR #${EXISTING} already open — updated with latest estimates."
          else
            gh pr create \
              --title "[PACE Plan Approval] Review sprint estimates before resuming" \
              --base "$DEFAULT_BRANCH" \
              --head "pace/plan-approval" \
              --body "$PR_BODY"
            echo "[PACE Planner] Plan-approval PR opened."
          fi
