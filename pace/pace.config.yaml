# PACE Framework Configuration
# Fill in all values before running Day 1.
# This file is the only place where project-specific information lives.
# All agents (PRIME, FORGE, GATE, SENTINEL, CONDUIT, SCRIBE) read from here.

framework_version: "1.0"

# ---------------------------------------------------------------------------
# Product identity — injected into every agent's system prompt
# ---------------------------------------------------------------------------
product:
  name: "My Product"                    # Short product name used in prompts
  description: >                        # One-paragraph description for agents
    A brief description of what this product does,
    who it's for, and what problem it solves.
  github_org: "my-org"                  # GitHub organization (used for CI, URLs)

# ---------------------------------------------------------------------------
# Sprint configuration
# ---------------------------------------------------------------------------
sprint:
  duration_days: 30                     # Total days in the sprint

# ---------------------------------------------------------------------------
# Release — optional; enables the sprint/release branch hierarchy (v2.0)
# ---------------------------------------------------------------------------
# When configured, PACE creates and maintains:
#   main → staging → release/<name> → rel/sprint/pace-N
# at the start of every day. Each branch level gets a PR gate when the
# sprint completes. Leave commented out to run without branch management.
#
# release:
#   name: "v2.0"          # Release version/name used in branch name (e.g. "v2.0", "q1-2026")
#   release_days: 90      # Total calendar days in the release (default: 90)
#   sprint_days: 7        # Days per sprint within the release (default: 7)

# ---------------------------------------------------------------------------
# Source code — FORGE only writes into the directories listed here.
# Paths are relative to the repo root.
# ---------------------------------------------------------------------------
source:
  dirs:
    - name: "core"                      # Short label (used internally)
      path: "src/"                      # Path relative to repo root
      language: "Python"                # Primary language in this directory
      description: "Core application source"

    # Add more directories as needed:
    # - name: "cli"
    #   path: "cli/"
    #   language: "Go"
    #   description: "CLI binary"

  # Optional: path to an external documentation folder for SCRIBE.
  # SCRIBE reads product/engineering/security/devops docs from here
  # to generate informed context documents for other agents.
  # Can be relative (resolved from the repo root's parent directory) or absolute.
  # Leave as null if you don't have external docs — SCRIBE will work from the repo alone.
  docs_dir: null
  # docs_dir: "../my-docs/my-project"

# ---------------------------------------------------------------------------
# Technology stack — used in agent prompts and GATE test runner
# ---------------------------------------------------------------------------
tech:
  primary_language: "Python 3.12"       # Primary language FORGE writes
  secondary_language: null              # Optional (e.g. "Go 1.22" for CLI)
  ci_system: "GitHub Actions"

  # Command GATE runs to execute the test suite (from repo root)
  test_command: "pytest -v --tb=short"

  # Optional build command run before tests
  build_command: null
  # build_command: "go build ./..."

# ---------------------------------------------------------------------------
# Platform — CI/CD and Git hosting integration
# ---------------------------------------------------------------------------
platform:
  # CI/CD platform — handles PRs/MRs, CI polling, and job summaries.
  # Supported values: github | gitlab | bitbucket | jenkins | local
  ci: github

  # Sprint tracker — handles HOLD escalations and advisory findings.
  # Supported values: jira | github | gitlab | bitbucket | local
  tracker: github

# ---------------------------------------------------------------------------
# Advisory backlog — controls how non-blocking findings are surfaced
# ---------------------------------------------------------------------------
advisory:
  # When true, PACE opens a platform issue/ticket each time advisory findings
  # are added to the backlog (after a retry was given but the issue persists).
  # Requires a platform that supports issue creation (github, gitlab, bitbucket, jira).
  # Set false (default) to keep advisories in .pace/advisory_backlog.yaml only.
  push_to_issues: false

# ---------------------------------------------------------------------------
# Cron schedules — centralized pipeline scheduling (v2.0)
# ---------------------------------------------------------------------------
# Edit these values and run `python pace/ci_generator.py --apply` to
# regenerate the cron triggers in your CI workflow files automatically.
# All expressions are 5-field POSIX format (minute hour dom month dow).
#
# Tip: change the schedule here, run ci_generator.py --apply, commit both
# files together. Never edit the cron in the workflow YAML directly.
cron:
  pace_pipeline: "0 9 * * 1-5"    # main PACE run — weekdays at 09:00 UTC
  planner_pipeline: "0 8 * * 1"   # weekly re-plan — Monday at 08:00 UTC
  update_check: "0 0 * * *"       # daily update check — midnight UTC
  timezone: "UTC"                  # IANA timezone for schedule interpretation

# ---------------------------------------------------------------------------
# Reporter — controls output formatting
# ---------------------------------------------------------------------------
reporter:
  # IANA timezone for all timestamps in PROGRESS.md and job summaries.
  # Examples: "UTC", "America/New_York", "Europe/London", "Asia/Tokyo"
  timezone: "UTC"

# ---------------------------------------------------------------------------
# Auto-update — version checking and self-update behaviour (v2.0)
# ---------------------------------------------------------------------------
updates:
  # When true (default), PACE checks for a new version once per calendar day.
  # If a newer version is available and no local customizations are detected,
  # the update is applied automatically (git checkout + pip install).
  # Set false to disable version checking entirely.
  auto_update: true

  # When auto_update is true but local customizations are detected, PACE emits
  # a WARNING at every pipeline run. Set suppress_warning: true to silence it
  # (e.g. you are aware of the pending update and will merge it manually).
  suppress_warning: false

  # "stable" — follow the latest non-prerelease tag (recommended)
  # "beta"   — follow the latest tag including pre-releases
  channel: stable

# ---------------------------------------------------------------------------
# LLM — AI provider and model for all PACE agents
# ---------------------------------------------------------------------------
llm:
  # provider: anthropic (default) | litellm
  #
  #   anthropic — Use the Anthropic SDK directly.
  #               Env var: ANTHROPIC_API_KEY
  #               Models: claude-sonnet-4-6 | claude-opus-4-6 | claude-haiku-4-5-20251001
  #
  #   litellm   — Route to any provider via LiteLLM.
  #               Set model with a provider prefix (see examples below).
  #               Env var: provider's own key (e.g. OPENAI_API_KEY, GEMINI_API_KEY)
  #
  provider: anthropic

  # FORGE and SCRIBE use `model` — these agents write code and need strong reasoning.
  model: claude-sonnet-4-6

  # PRIME, GATE, SENTINEL, CONDUIT use `analysis_model` — single-call analytical agents.
  # Haiku is 4–5× cheaper and fast enough for structured YAML analysis.
  # Omit to default to the same model as FORGE (no cost savings but no config required).
  analysis_model: claude-haiku-4-5-20251001

  # LiteLLM model examples (uncomment and set provider: litellm to use):
  # model: openai/gpt-4o                              # OpenAI (OPENAI_API_KEY)
  # model: openai/o3-mini                             # OpenAI o3-mini
  # model: gemini/gemini-2.0-flash                    # Google Gemini (GEMINI_API_KEY)
  # model: bedrock/anthropic.claude-sonnet-4-6        # AWS Bedrock (AWS_* env vars)
  # model: azure/gpt-4o                               # Azure OpenAI (AZURE_* env vars)
  # model: groq/llama-3.1-70b-versatile               # Groq (GROQ_API_KEY)
  # model: mistral/mistral-large-latest               # Mistral (MISTRAL_API_KEY)
  # model: ollama/llama3.1                            # Local Ollama (no key needed)

  # base_url: null   # Optional endpoint override (e.g. for self-hosted Ollama)
  # base_url: "http://localhost:11434"

  # ---------------------------------------------------------------------------
  # Token limits per agent class (v2.0 — Context Versioning)
  # ---------------------------------------------------------------------------
  # Coding agents (FORGE, SCRIBE) need large windows: system prompt (~4k) +
  # tool definitions (~5k) + file contents (up to ~80k) + iteration history.
  # Analysis agents (PRIME, GATE, SENTINEL, CONDUIT) receive summarised context.
  #
  # WARNING: forge_input_tokens below 32000 is dangerously low — a single large
  # file read plus conversation history at iteration 10+ routinely exceeds 32k.
  #
  # These defaults are safe. Only lower them if you are running a cost budget.
  limits:
    forge_input_tokens: 160000     # FORGE + SCRIBE input context ceiling
    forge_output_tokens: 16384     # prevents mid-file truncation during code gen
    analysis_input_tokens: 80000   # PRIME/GATE/SENTINEL/CONDUIT input context ceiling
    analysis_output_tokens: 8192   # structured YAML analysis responses

# ---------------------------------------------------------------------------
# Cost control — proactive story scoping before FORGE runs
# ---------------------------------------------------------------------------
# When a story exceeds either threshold, PRIME is re-invoked to split it:
# today's story carries the highest-value AC (up to max_story_ac), and the
# remainder is written to .pace/day-N/deferred_scope.yaml so the next day's
# PRIME automatically incorporates them into the following story.
# Up to 2 refinement rounds are attempted before proceeding as-is.
cost_control:
  # Maximum acceptance criteria per story. PRIME refinement is triggered if
  # the generated story card exceeds this count. Set to 0 to disable.
  max_story_ac: 5

  # Maximum predicted FORGE cost in USD. A lightweight Haiku pre-check (SCOPE)
  # estimates the cost before FORGE runs. If the estimate exceeds this value,
  # PRIME refinement is triggered. Set to 0 to disable the cost pre-check.
  max_story_cost_usd: 1.50

# ---------------------------------------------------------------------------
# Notifications — channel credentials for alert delivery (v2.0 Item 5)
# ---------------------------------------------------------------------------
# Configure one or more channels here. Values may use ${ENV_VAR} syntax to
# read secrets from environment variables rather than committing them.
#
# notifications:
#   slack:
#     webhook_url: "${SLACK_WEBHOOK_URL}"   # Slack Incoming Webhook URL
#
#   teams:
#     webhook_url: "${TEAMS_WEBHOOK_URL}"   # Microsoft Teams Incoming Webhook URL
#
#   email:
#     smtp_host: "smtp.example.com"
#     smtp_port: 587                        # 587 (STARTTLS, default) | 465 (SSL) | 25
#     smtp_user: "alerts@example.com"       # omit for unauthenticated relay
#     smtp_password: "${SMTP_PASSWORD}"     # omit for unauthenticated relay
#     from_addr: "PACE Alerts <alerts@example.com>"
#     to_addrs:
#       - "team@example.com"
#       - "oncall@example.com"

# ---------------------------------------------------------------------------
# Alert rules — map pipeline events to notification channels (v2.0 Item 5)
# ---------------------------------------------------------------------------
# Each rule specifies an event name, a list of channels (from notifications:
# above), and optional numeric thresholds. Rules are evaluated in order.
#
# Supported events:
#   hold_opened          — FORGE exhausted retries; escalation issue was opened
#   story_shipped        — all agents passed; cycle.md written
#   cost_exceeded        — daily accumulated spend crossed threshold_usd
#   pipeline_lock_timeout — preflight detected a live concurrent pipeline run
#   update_available     — updater.py detected a newer PACE version
#
# alerts:
#   - event: hold_opened
#     channels: [slack, teams]
#
#   - event: story_shipped
#     channels: [slack]
#
#   - event: cost_exceeded
#     channels: [email]
#     threshold_usd: 5.00        # only fire when daily spend >= $5.00
#
#   - event: pipeline_lock_timeout
#     channels: [slack]

# ---------------------------------------------------------------------------
# Plugins — extend PACE with community or custom plugins (v2.1)
# ---------------------------------------------------------------------------
# Plugins are Python packages installed alongside PACE that register
# themselves via pyproject.toml entry points under the pace.plugins.* groups.
# PACE auto-discovers all installed plugins at startup. Use this section to:
#   - Provide per-plugin configuration (API keys, URLs, etc.)
#   - Disable a plugin without uninstalling its package (enabled: false)
#   - Override the webhook-in HTTP server port (default: 9876)
#
# Plugin types:
#   agent       — adds a new agent to the pipeline
#   tool        — adds a tool to FORGE/SCRIBE's tool registry
#   adapter     — adds a new LLM/platform/notification adapter
#   hook        — runs at pipeline lifecycle events (fire-and-forget)
#   webhook-in  — exposes an HTTP listener for external triggers
#   webhook-out — POSTs structured JSON to a URL on lifecycle events
#
# Example:
# plugins:
#   - name: "pace-plugin-linear"          # must match plugin's manifest name
#     enabled: true                        # default true; set false to skip
#     config:
#       api_key: "${LINEAR_API_KEY}"       # ${VAR} env interpolation supported
#       team_id: "ENG"
#
#   - name: "pace-plugin-webhook-out"
#     config:
#       url: "${WEBHOOK_URL}"
#       subscribed_events: [day_shipped, day_held]
#
#   - name: "pace-plugin-webhook-in"
#     webhook_in_port: 9876               # port for the built-in HTTP listener
#     config:
#       secret: "${WEBHOOK_SECRET}"
#
# Supported lifecycle events for hook / webhook-out plugins:
#   pipeline_start   pipeline_end   day_start    day_shipped    day_held
#   story_generated  forge_complete gate_pass    sentinel_pass  conduit_pass

# ---------------------------------------------------------------------------
# Training Data Pipeline — LLM fine-tuning corpus export (v2.2)
# ---------------------------------------------------------------------------
# When export_on_ship is true (default), PACE appends one record per shipped
# sprint day to a JSONL corpus file in output_dir/.  These traces are ready
# for supervised fine-tuning (SFT) or RLHF reward-model training on any
# framework that accepts Anthropic messages format (e.g. together.ai, modal,
# or Anthropic's own fine-tuning API when available).
#
# Output files:
#   <output_dir>/sft_corpus.jsonl     — (system, messages) pairs for SFT
#   <output_dir>/reward_corpus.jsonl  — (prompt, completion, reward) for RLHF
#
# Reward score formula:
#   base  = gate_pass_rate            (fraction of AC that passed)
#   bonus = +0.10 if iterations <= 10 (efficient implementation)
#   cost  = -min(0.20, cost_usd*0.10) (proportional cost penalty)
#   score = clamp(base + bonus - cost, 0.0, 1.0)
#
training:
  export_on_ship: true           # Append trace on every SHIP event
  output_dir: "training_data"   # Relative to CWD when orchestrator runs
  format: "both"                # "sft" | "reward" | "both"
  min_gate_pass_rate: 0.0       # 0.0 = collect all; raise to filter low-quality traces

# ---------------------------------------------------------------------------
# FORGE agent behaviour
# ---------------------------------------------------------------------------
forge:
  # Enforce mandatory 4-phase TDD: RED → GREEN → REFACTOR → COMMIT.
  # When true, FORGE must call confirm_red_phase (with failing test evidence)
  # before it can write any implementation code. complete_handoff is blocked
  # until confirm_red_phase has been called successfully.
  # Set false for stories with nothing to test (docs, infra config, migrations).
  tdd_enforcement: true

  # Include the coverage rule in FORGE's system prompt.
  # When true, FORGE is instructed that every production file it creates or
  # modifies must have corresponding tests, and it must not reduce existing
  # test counts.
  # Effective only when tdd_enforcement is true; ignored when false.
  coverage_rule: true

  # Maximum number of tool-use iterations FORGE may take per story.
  # Raise for complex multi-file stories; lower to cap cost on simpler ones.
  # Default: 35.
  max_iterations: 35
