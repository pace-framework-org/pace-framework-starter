[tool:pytest]
testpaths = tests

[coverage:run]
omit =
    # Pipeline orchestration — needs full runtime environment
    pace/agents/*
    pace/orchestrator.py
    pace/planner.py
    pace/reporter.py
    pace/updater.py
    pace/preflight.py
    pace/branching.py
    # LLM adapters — need real API keys
    pace/llm/anthropic_adapter.py
    pace/llm/litellm_adapter.py
    pace/llm/__init__.py
    pace/llm/base.py
    # HTTP platform adapters — integration tests, not unit tests
    pace/platforms/github.py
    pace/platforms/gitlab.py
    pace/platforms/bitbucket.py
    pace/platforms/jira.py
    # Notification adapters — need real SMTP/Slack/Teams credentials
    pace/notifications/*
    # Plugin loader — requires installed entry-point packages
    pace/plugins/loader.py
    # Config tester — integration-level validation
    pace/config_tester.py
    tests/*
    */__pycache__/*

[coverage:report]
exclude_lines =
    pragma: no cover
    if __name__ == .__main__.:
    raise NotImplementedError
    \.\.\.
