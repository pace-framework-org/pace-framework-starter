# PACE Daily Cycle — GitLab CI
#
# This file is managed by PACE ci_generator.py.
# To change the schedule, update the `cron:` section in pace/pace.config.yaml
# and run:  python pace/ci_generator.py --apply
#
# Required CI/CD Variables (Settings → CI/CD → Variables):
#   ANTHROPIC_API_KEY   — Anthropic API key (type: Variable, masked)
#   PACE_DAY            — current sprint day (update each morning, or use the
#                         PACE_DAY calculation in the before_script below)
#
# Optional CI/CD Variables:
#   PACE_PAUSED         — "true" to pause the loop after a HOLD (default: "false")
#   PACE_DAILY_BUDGET   — daily cost cap in USD (e.g. "5.00"; 0 or empty = no cap)
#   PACE_DAILY_SPEND    — accumulated daily spend (updated by PACE each run)
#   PACE_DAILY_SPEND_DATE — date of PACE_DAILY_SPEND; auto-reset when stale
#   PACE_REPORTER_TIMEZONE — IANA timezone for timestamps (default: "UTC")
#
# GitLab-specific variables injected automatically:
#   GITLAB_TOKEN        — use $CI_JOB_TOKEN or a project access token
#   GITLAB_PROJECT      — $CI_PROJECT_PATH (e.g. "mygroup/myrepo")

stages:
  - pace

default:
  image: python:3.12-slim
  before_script:
    - git config user.name "PACE Orchestrator"
    - git config user.email "pace@gitlab.com"
    - pip install -r pace/requirements.txt --quiet

# ---------------------------------------------------------------------------
# Daily PACE cycle
# ---------------------------------------------------------------------------
pace:
  stage: pace
  # Edit the schedule in pace/pace.config.yaml → cron.pace_pipeline, then
  # run: python pace/ci_generator.py --apply  to regenerate this file.
  rules:
    - if: '$CI_PIPELINE_SOURCE == "schedule"'
    - if: '$CI_PIPELINE_SOURCE == "web"'
  timeout: 90 minutes
  variables:
    GITLAB_TOKEN: $CI_JOB_TOKEN
    GITLAB_PROJECT: $CI_PROJECT_PATH
    PACE_PAUSED: ${PACE_PAUSED:-false}
  script:
    # Validate configuration before running
    - python pace/config_tester.py

    # Daily budget guard (skip on web/manual trigger)
    - |
      if [ "$CI_PIPELINE_SOURCE" = "schedule" ]; then
        TODAY=$(TZ="${PACE_REPORTER_TIMEZONE:-UTC}" date +%Y-%m-%d)
        BUDGET="${PACE_DAILY_BUDGET:-0}"
        SPEND="${PACE_DAILY_SPEND:-0}"
        if [ "${PACE_DAILY_SPEND_DATE:-}" != "$TODAY" ]; then
          SPEND="0"
        fi
        export PACE_SPEND_TODAY="$SPEND"
        if [ "$BUDGET" != "0" ] && [ -n "$BUDGET" ]; then
          if python3 -c "import sys; sys.exit(0 if float('$SPEND') >= float('$BUDGET') else 1)"; then
            echo "[PACE] Daily budget \$$BUDGET reached (\$$SPEND today). Skipping."
            exit 0
          fi
        fi
      else
        export PACE_SPEND_TODAY="${PACE_DAILY_SPEND:-0}"
      fi

    # Run PACE
    - python pace/orchestrator.py
  artifacts:
    when: always
    paths:
      - .pace/
      - PROGRESS.md
    expire_in: 30 days

# ---------------------------------------------------------------------------
# Weekly PACE planner (Day 0 re-estimation)
# ---------------------------------------------------------------------------
pace-planner:
  stage: pace
  rules:
    - if: '$CI_PIPELINE_SOURCE == "schedule" && $PACE_RUN_PLANNER == "true"'
    - if: '$CI_PIPELINE_SOURCE == "web" && $PACE_RUN_PLANNER == "true"'
  timeout: 30 minutes
  variables:
    GITLAB_TOKEN: $CI_JOB_TOKEN
    GITLAB_PROJECT: $CI_PROJECT_PATH
    PACE_DAY: "0"
    PACE_REPLAN: ${PACE_REPLAN:-false}
  script:
    - python pace/orchestrator.py
  artifacts:
    when: always
    paths:
      - .pace/day-0/
    expire_in: 30 days
